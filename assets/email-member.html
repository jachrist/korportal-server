<!DOCTYPE html>
<html lang="no" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SUBJECT}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #0b1220; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <!-- Outer wrapper -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #0b1220;">
        <tr>
            <td align="center" style="padding: 24px 16px;">
                <!-- Inner container -->
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #101828; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.10);">

                    <!-- Header with logo -->
                    <tr>
                        <td align="center" style="padding: 32px 24px 16px; background-color: #0d1422;">
                            <img src="{{LOGO_URL}}" alt="Kammerkoret Utsikten" width="64" height="64" style="display: block; border: 0; width: 64px; height: 64px; border-radius: 12px;">
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 8px 24px 24px; background-color: #0d1422;">
                            <h1 style="margin: 0; font-size: 24px; font-weight: 700; color: #eaf0ff; line-height: 1.3;">{{SUBJECT}}</h1>
                            <p style="margin: 8px 0 0; font-size: 15px; color: rgba(234,240,255,0.60); line-height: 1.5;">Melding fra styret i Kammerkoret Utsikten</p>
                        </td>
                    </tr>

                    <!-- Message body -->
                    <tr>
                        <td style="padding: 0 24px 24px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: rgba(93,214,255,0.05); border: 1px solid rgba(93,214,255,0.15); border-radius: 12px;">
                                <tr>
                                    <td style="padding: 24px;">
                                        <p style="margin: 0; font-size: 15px; color: #eaf0ff; line-height: 1.7; white-space: pre-line;">{{MESSAGE}}</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Sender info -->
                    <tr>
                        <td style="padding: 0 24px 24px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; overflow: hidden;">
                                <tr>
                                    <td style="padding: 12px 16px; font-size: 13px; font-weight: 600; color: rgba(234,240,255,0.60); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.10); background-color: #0d1422;">Avsender</td>
                                </tr>
                                <tr>
                                    <td style="padding: 0;">
                                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                                            <tr>
                                                <td style="padding: 12px 16px; font-size: 14px; color: rgba(234,240,255,0.60); border-bottom: 1px solid rgba(255,255,255,0.06);">Navn</td>
                                                <td style="padding: 12px 16px; font-size: 14px; color: #eaf0ff; font-weight: 500; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.06);">{{SENDER_NAME}}</td>
                                            </tr>
                                            <tr>
                                                <td style="padding: 12px 16px; font-size: 14px; color: rgba(234,240,255,0.60);">Sendt</td>
                                                <td style="padding: 12px 16px; font-size: 14px; color: #eaf0ff; font-weight: 500; text-align: right;">{{SENT_DATE}}</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- CTA button -->
                    <tr>
                        <td align="center" style="padding: 0 24px 32px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="background-color: #5dd6ff; border-radius: 10px;">
                                        <a href="https://www.kammerkoretutsikten.no/korportal" style="display: inline-block; padding: 14px 32px; font-size: 15px; font-weight: 600; color: #0b1220; text-decoration: none; border-radius: 10px;">Gå til Korportalen</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 24px; background-color: #0d1422; border-top: 1px solid rgba(255,255,255,0.10); text-align: center;">
                            <p style="margin: 0; font-size: 13px; color: rgba(234,240,255,0.40); line-height: 1.5;">
                                Kammerkoret Utsikten<br>
                                <a href="https://www.kammerkoretutsikten.no" style="color: #5dd6ff; text-decoration: none;">kammerkoretutsikten.no</a>
                            </p>
                            <p style="margin: 12px 0 0; font-size: 12px; color: rgba(234,240,255,0.25);">
                                Du mottar denne e-posten fordi du er medlem i Kammerkoret Utsikten.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
