<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kammerkoret Utsikten">
    <meta name="description" content="Øvelsesside for Utsikten - noter og øvefiler">
    <title>Øvelse - Kammerkoret Utsikten</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon og ikoner -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/icon-16.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-180.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ovelse.css">
    <script src="js/vendor/pdf.min.js"></script>
</head>
<body class="ovelse-body">
    <!-- Header -->
    <header class="ovelse-header" id="header">
        <div class="ovelse-header__left">
            <img src="/assets/icons/utsikten-logo.png" alt="Utsikten logo" class="uts-logo">
            <span class="ovelse-header__title" id="programTitle">Øvelse</span>
        </div>
        <div class="ovelse-header__right">
            <button class="ovelse-header__btn" id="themeBtn" title="Bytt tema" aria-label="Bytt tema">
                🌙
            </button>
            <button class="ovelse-header__btn" id="menuBtn" title="Meny" aria-label="Åpne meny">
                ☰
            </button>
        </div>
    </header>

    <!-- Menu overlay -->
    <div class="uts-menuOverlay" id="menuOverlay" aria-hidden="true">
        <div class="uts-menuPanel" role="menu" aria-label="Hovedmeny">
            <div class="uts-menuHeader">
                <h3>Meny</h3>
                <button class="uts-closeBtn" id="menuClose" type="button" title="Lukk">✕</button>
            </div>
            <nav class="uts-menuList" id="menuList"></nav>
        </div>
    </div>

    <!-- Top control bar with mode and voice selection -->
    <div class="control-bar" id="controlBar">
        <div class="control-bar__group">
            <label class="control-bar__label">Modus:</label>
            <div class="control-bar__buttons">
                <button class="control-btn" data-mode="both" title="Noter + Lyd">
                    <span>📄🎵</span>
                </button>
                <button class="control-btn" data-mode="notes" title="Kun noter">
                    <span>📄</span>
                </button>
                <button class="control-btn" data-mode="audio" title="Kun lyd">
                    <span>🎧</span>
                </button>
            </div>
        </div>
        <div class="control-bar__group">
            <label class="control-bar__label">Anledning:</label>
            <select class="control-bar__select" id="anledningSelect">
                <option value="">Laster...</option>
            </select>
        </div>
        <div class="control-bar__group">
            <label class="control-bar__label">Stemme:</label>
            <select class="control-bar__select" id="voiceSelect">
                <option value="">Velg stemme</option>
                <option value="sopran 1">Sopran 1</option>
                <option value="sopran 2">Sopran 2</option>
                <option value="alt 1">Alt 1</option>
                <option value="alt 2">Alt 2</option>
                <option value="tenor 1">Tenor 1</option>
                <option value="tenor 2">Tenor 2</option>
                <option value="bass 1">Bass 1</option>
                <option value="bass 2">Bass 2</option>
                <option value="tutti">Tutti</option>
            </select>
        </div>
        <div class="control-bar__group">
            <button class="control-btn" id="autoTurnBtn" title="Autoblading av/på">
                <span>📖</span>
            </button>
        </div>
        <div class="control-bar__group">
            <button class="control-btn" id="offlineDownloadBtn" title="Last ned for offline">
                <span>⬇️</span>
            </button>
            <button class="control-btn" id="offlineClearBtn" title="Slett offline-filer" hidden>
                <span>🗑️</span>
            </button>
        </div>
        <div class="control-bar__group control-bar__group--admin" id="adminGroup" hidden>
            <button class="control-btn" id="pageTurnRecordBtn" title="Registrer sideskift">
                <span>⏱</span>
            </button>
        </div>
    </div>

    <!-- Offline download progress -->
    <div class="offline-progress" id="offlineProgress" hidden>
        <div class="offline-progress__bar">
            <div class="offline-progress__fill" id="offlineProgressFill"></div>
        </div>
        <span class="offline-progress__text" id="offlineProgressText">0 av 0 filer</span>
    </div>

    <!-- Auto-turn message -->
    <div class="autoturn-message" id="autoTurnMessage" hidden>
        <span id="autoTurnMessageText"></span>
    </div>

    <!-- Main content area -->
    <main class="ovelse-main" id="main">
        <!-- PDF viewer -->
        <div class="pdf-viewer" id="pdfViewer">
            <div class="pdf-container" id="pdfContainer">
                <canvas id="pdfCanvas"></canvas>
            </div>

            <!-- Navigation arrows overlay -->
            <button class="pdf-nav-btn pdf-nav-btn--left" id="pdfPrevPage" aria-label="Forrige side">
                ‹
            </button>
            <button class="pdf-nav-btn pdf-nav-btn--right" id="pdfNextPage" aria-label="Neste side">
                ›
            </button>

            <!-- PDF error/status message -->
            <div class="pdf-message" id="pdfMessage" hidden>
                <p id="pdfMessageText">Laster noter...</p>
            </div>
        </div>

        <!-- Audio-only mode view -->
        <div class="audio-view" id="audioView" hidden>
            <div class="audio-view__content">
                <div class="audio-view__icon" id="audioIcon">🎵</div>
                <h2 class="audio-view__title" id="audioViewTitle">-</h2>
                <p class="audio-view__voice" id="audioViewVoice">-</p>
                <div class="audio-view__progress-container" id="audioProgressContainer">
                    <div class="audio-view__progress">
                        <div class="audio-view__progress-bar" id="audioProgressBar"></div>
                    </div>
                    <p class="audio-view__time" id="audioTime">0:00 / 0:00</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom control bar -->
    <div class="bottom-controls" id="bottomControls">
        <!-- Work navigation -->
        <div class="work-nav">
            <button class="work-nav__btn" id="prevWork" aria-label="Forrige sang">
                ⏮
            </button>
            <div class="work-nav__info">
                <span class="work-nav__title" id="currentTitle">Velg en stemme for å starte</span>
                <span class="work-nav__subtitle" id="workInfo">-</span>
            </div>
            <button class="work-nav__btn" id="nextWork" aria-label="Neste sang">
                ⏭
            </button>
        </div>

        <!-- Audio controls -->
        <div class="audio-controls" id="audioControls">
            <button class="audio-btn audio-btn--play" id="playPauseBtn" aria-label="Spill/Pause">
                ▶
            </button>
            <div class="audio-progress" id="audioProgressClickable">
                <div class="audio-progress__bar">
                    <div class="audio-progress__fill" id="audioProgressFill"></div>
                </div>
                <span class="audio-progress__time" id="audioTimeDisplay">0:00 / 0:00</span>
            </div>
            <span class="audio-status" id="audioStatus"></span>
        </div>

        <!-- Page navigation (when showing PDF) -->
        <div class="page-nav" id="pageNav">
            <button class="page-nav__btn" id="prevPage" aria-label="Forrige side">‹</button>
            <span class="page-nav__info" id="pageInfo">Side 1/1</span>
            <button class="page-nav__btn" id="nextPage" aria-label="Neste side">›</button>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer" preload="auto"></audio>

    <!-- Initial voice selection modal (first visit) -->
    <div class="welcome-modal" id="welcomeModal" hidden>
        <div class="welcome-modal__content">
            <h2>Velkommen til øvelsen!</h2>
            <p>Velg din stemmegruppe for å starte:</p>
            <div class="welcome-modal__grid">
                <button class="voice-btn" data-voice="sopran 1">Sopran 1</button>
                <button class="voice-btn" data-voice="sopran 2">Sopran 2</button>
                <button class="voice-btn" data-voice="alt 1">Alt 1</button>
                <button class="voice-btn" data-voice="alt 2">Alt 2</button>
                <button class="voice-btn" data-voice="tenor 1">Tenor 1</button>
                <button class="voice-btn" data-voice="tenor 2">Tenor 2</button>
                <button class="voice-btn" data-voice="bass 1">Bass 1</button>
                <button class="voice-btn" data-voice="bass 2">Bass 2</button>
                <button class="voice-btn voice-btn--tutti" data-voice="tutti">Tutti</button>
            </div>
        </div>
    </div>

    <!-- Page Turn Recorder Bar (admin) -->
    <div class="recorder-bar" id="pageTurnRecorder" hidden>
        <span class="recorder-bar__label" id="recorderWorkName">-</span>
        <span class="recorder-bar__turns" id="recorderTurnsInfo">0 skift</span>
        <button class="recorder-bar__btn recorder-bar__btn--start" id="recorderStart" title="Start">Start</button>
        <button class="recorder-bar__btn recorder-bar__btn--next" id="recorderNext" disabled title="Neste side">Neste</button>
        <span class="recorder-bar__page-group">
            <button class="recorder-bar__btn recorder-bar__btn--jump" id="recorderJump" disabled title="Hopp til side">Hopp</button>
            <label class="recorder-bar__page-label" id="recorderPageLabel" hidden>s.</label>
            <input type="number" class="recorder-bar__page-input" id="recorderTargetPage" min="1" value="1" hidden>
            <button class="recorder-bar__btn recorder-bar__btn--jump-ok" id="recorderJumpOk" hidden>OK</button>
        </span>
        <button class="recorder-bar__btn recorder-bar__btn--undo" id="recorderUndo" disabled title="Angre">Angre</button>
        <button class="recorder-bar__btn recorder-bar__btn--stop" id="recorderStop" disabled title="Lagre">Lagre</button>
        <button class="recorder-bar__btn recorder-bar__btn--cancel" id="recorderCancel" title="Avbryt">✕</button>
        <div class="recorder-bar__list-wrapper" id="recorderListWrapper" hidden>
            <ol class="recorder-bar__list" id="recorderList"></ol>
        </div>
    </div>

    <!-- Loading screen -->
    <div class="loader" id="loader">
        <div class="loader__content">
            <div class="loader__spinner"></div>
            <p class="loader__text">Laster øvelsesdata...</p>
        </div>
    </div>

    <script src="js/env.js"></script>
    <script type="module" src="js/ovelse.js"></script>

    <script src="js/sw-register.js"></script>
</body>
</html>
