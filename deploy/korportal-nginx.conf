server {
    listen 80;
    server_name server.kammerkoretutsikten.no;

    # Certbot will auto-add redirect to HTTPS after setup

    # --- API reverse proxy ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (50MB)
        client_max_body_size 50m;
    }

    # --- Uploaded files (PDF, MP3, images) ---
    location /uploads/ {
        alias /var/data/korportal/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend static files ---
    location / {
        root /opt/korportal/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Cache static assets ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /opt/korportal/frontend;
        expires 30d;
        add_header Cache-Control "public";
    }
}
