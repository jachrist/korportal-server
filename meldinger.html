<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kammerkoret Utsikten">
    <meta name="description" content="Meldinger fra styret - Kammerkoret Utsikten">
    <title>Meldinger - Kammerkoret Utsikten</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon og ikoner -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/icon-16.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-180.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/meldinger.css">
    <link rel="stylesheet" href="css/markdown-editor.css">
</head>
<body>
    <!-- Header -->
    <header class="uts-topbar">
        <div class="uts-brandMini">
            <img src="/assets/icons/utsikten-logo.png" alt="Utsikten logo" class="uts-logo">
            <span class="uts-brandMiniText">Meldinger</span>
        </div>
        <div class="uts-topActions">
            <button class="uts-btnTheme" id="themeBtn" title="Bytt tema">🌙</button>
            <button class="uts-btnIcon" id="menuBtn" title="Meny" aria-haspopup="true" aria-expanded="false">☰</button>
        </div>
    </header>

    <!-- Menu overlay -->
    <div class="uts-menuOverlay" id="menuOverlay" aria-hidden="true">
        <div class="uts-menuPanel" role="menu" aria-label="Hovedmeny">
            <div class="uts-menuHeader">
                <h3>Meny</h3>
                <button class="uts-closeBtn" id="menuClose" type="button" title="Lukk">✕</button>
            </div>
            <nav class="uts-menuList" id="menuList"></nav>
        </div>
    </div>

    <!-- Main content -->
    <main class="meldinger-main">
        <div class="meldinger-container">
            <!-- Header with search -->
            <div class="meldinger-header">
                <div class="meldinger-header__top">
                    <h1>Meldinger fra styret</h1>
                    <button class="new-post-btn" id="newMeldingBtn" hidden>
                        ✏️ Ny melding
                    </button>
                </div>
                <div class="search-box">
                    <input
                        type="search"
                        id="searchInput"
                        placeholder="Søk i meldinger..."
                        aria-label="Søk i meldinger"
                    >
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <!-- Messages list -->
            <div class="meldinger-list" id="meldingerList">
                <!-- Messages loaded dynamically -->
            </div>

            <!-- Load more button -->
            <div class="load-more-container" id="loadMoreContainer" hidden>
                <button class="load-more-btn" id="loadMoreBtn">
                    Vis flere meldinger
                </button>
            </div>

            <!-- Empty state -->
            <div class="meldinger-empty" id="emptyState" hidden>
                <span class="empty-icon">📭</span>
                <p id="emptyText">Ingen meldinger å vise</p>
            </div>
        </div>
    </main>

    <!-- Comment modal -->
    <div class="comment-modal" id="commentModal" hidden>
        <div class="comment-modal-content">
            <div class="comment-modal-header">
                <h3>Skriv kommentar</h3>
                <button class="comment-modal-close" id="commentModalClose" title="Lukk">✕</button>
            </div>
            <div class="comment-modal-body">
                <textarea
                    id="commentText"
                    placeholder="Skriv din kommentar her..."
                    maxlength="1000"
                ></textarea>
            </div>
            <div class="comment-modal-footer">
                <button class="comment-cancel-btn" id="commentCancel">Avbryt</button>
                <button class="comment-submit-btn" id="commentSubmit">Send kommentar</button>
            </div>
        </div>
    </div>

    <!-- New message modal -->
    <div class="post-modal" id="meldingModal" hidden>
        <div class="post-modal-content">
            <div class="post-modal-header">
                <h3>Ny melding fra styret</h3>
                <button class="post-modal-close" id="meldingModalClose" title="Lukk">✕</button>
            </div>
            <div class="post-modal-body">
                <div class="form-group">
                    <label for="meldingTitle">Tittel *</label>
                    <input type="text" id="meldingTitle" placeholder="Gi meldingen en tittel..." maxlength="200" required>
                </div>
                <div class="form-group">
                    <label for="meldingContent">Innhold *</label>
                    <textarea id="meldingContent" placeholder="Skriv meldingen..." maxlength="5000" required></textarea>
                </div>
            </div>
            <div class="post-modal-footer">
                <button class="post-cancel-btn" id="meldingCancel">Avbryt</button>
                <button class="post-submit-btn" id="meldingSubmit">Publiser melding</button>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loader" id="loader">
        <div class="loader__content">
            <div class="loader__spinner"></div>
            <p class="loader__text">Laster meldinger...</p>
        </div>
    </div>

    <script src="js/env.js"></script>
    <script type="module" src="js/meldinger.js"></script>

    <script src="js/sw-register.js"></script>
</body>
</html>
