<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kammerkoret Utsikten">
    <meta name="description" content="Øvelsesside for Utsikten - noter og øvefiler">
    <title>Øvelse - Kammerkoret Utsikten</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/icon-16.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-180.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ovelse.css">
    <link rel="stylesheet" href="css/ovelse2.css">
    <script src="js/vendor/pdf.min.js"></script>
</head>
<body class="ovelse-body ovelse2-body">
    <!-- Compact top bar -->
    <header class="o2-topbar" id="header">
        <button class="o2-topbar__settings-btn" id="settingsBtn" title="Innstillinger" aria-label="Innstillinger">
            <span>&#9881;</span>
        </button>
        <select class="o2-topbar__select" id="anledningSelect" title="Anledning">
            <option value="">Laster...</option>
        </select>
        <select class="o2-topbar__select" id="voiceSelect" title="Stemme">
            <option value="">Velg stemme</option>
            <option value="sopran 1">Sopran 1</option>
            <option value="sopran 2">Sopran 2</option>
            <option value="alt 1">Alt 1</option>
            <option value="alt 2">Alt 2</option>
            <option value="tenor 1">Tenor 1</option>
            <option value="tenor 2">Tenor 2</option>
            <option value="bass 1">Bass 1</option>
            <option value="bass 2">Bass 2</option>
            <option value="tutti">Tutti</option>
        </select>
        <span class="o2-topbar__title" id="programTitle">Øvelse</span>
    </header>

    <!-- Settings panel (slides from left) -->
    <div class="o2-settings-overlay" id="settingsOverlay" hidden>
        <div class="o2-settings" id="settingsPanel">
            <div class="o2-settings__header">
                <h3>Innstillinger</h3>
                <button class="o2-settings__close" id="settingsClose">&#10005;</button>
            </div>
            <nav class="o2-settings__list">
                <button class="o2-settings__item" data-mode="both">
                    <span class="o2-settings__icon">📄🎵</span>
                    <span>Noter + lyd</span>
                </button>
                <button class="o2-settings__item" data-mode="notes">
                    <span class="o2-settings__icon">📄</span>
                    <span>Kun noter</span>
                </button>
                <button class="o2-settings__item" data-mode="audio">
                    <span class="o2-settings__icon">🎧</span>
                    <span>Kun lyd</span>
                </button>
                <hr class="o2-settings__divider">
                <button class="o2-settings__item" id="autoTurnBtn">
                    <span class="o2-settings__icon">📖</span>
                    <span>Autoblading</span>
                    <span class="o2-settings__badge" id="autoTurnBadge">Av</span>
                </button>
                <button class="o2-settings__item" id="downloadPdfBtn">
                    <span class="o2-settings__icon">📥</span>
                    <span>Last ned noter (PDF)</span>
                </button>
                <button class="o2-settings__item" id="offlineDownloadBtn">
                    <span class="o2-settings__icon">💾</span>
                    <span>Last ned for offline</span>
                </button>
                <button class="o2-settings__item" id="offlineClearBtn" hidden>
                    <span class="o2-settings__icon">🗑️</span>
                    <span>Slett offline-filer</span>
                </button>
                <hr class="o2-settings__divider">
                <button class="o2-settings__item" id="themeBtn">
                    <span class="o2-settings__icon">🌙</span>
                    <span>Bytt tema</span>
                </button>
                <button class="o2-settings__item" id="menuBtn">
                    <span class="o2-settings__icon">☰</span>
                    <span>Hovedmeny</span>
                </button>
            </nav>
            <div class="o2-settings__admin" id="adminGroup" hidden>
                <hr class="o2-settings__divider">
                <button class="o2-settings__item" id="pageTurnRecordBtn">
                    <span class="o2-settings__icon">⏱</span>
                    <span>Registrer sideskift</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Menu overlay (reused from navigation.js) -->
    <div class="uts-menuOverlay" id="menuOverlay" aria-hidden="true">
        <div class="uts-menuPanel" role="menu" aria-label="Hovedmeny">
            <div class="uts-menuHeader">
                <h3>Meny</h3>
                <button class="uts-closeBtn" id="menuClose" type="button" title="Lukk">✕</button>
            </div>
            <nav class="uts-menuList" id="menuList"></nav>
        </div>
    </div>

    <!-- Offline download progress -->
    <div class="offline-progress" id="offlineProgress" hidden>
        <div class="offline-progress__bar">
            <div class="offline-progress__fill" id="offlineProgressFill"></div>
        </div>
        <span class="offline-progress__text" id="offlineProgressText">0 av 0 filer</span>
    </div>

    <!-- Auto-turn message -->
    <div class="autoturn-message" id="autoTurnMessage" hidden>
        <span id="autoTurnMessageText"></span>
    </div>

    <!-- Main content area - maximum space for notes -->
    <main class="ovelse-main o2-main" id="main">
        <!-- PDF viewer -->
        <div class="pdf-viewer" id="pdfViewer">
            <div class="pdf-container" id="pdfContainer">
                <canvas id="pdfCanvas"></canvas>
            </div>
            <button class="pdf-nav-btn pdf-nav-btn--left" id="pdfPrevPage" aria-label="Forrige side">‹</button>
            <button class="pdf-nav-btn pdf-nav-btn--right" id="pdfNextPage" aria-label="Neste side">›</button>
            <div class="pdf-message" id="pdfMessage" hidden>
                <p id="pdfMessageText">Laster noter...</p>
            </div>
        </div>

        <!-- Audio-only mode view -->
        <div class="audio-view" id="audioView" hidden>
            <div class="audio-view__content">
                <div class="audio-view__icon" id="audioIcon">🎵</div>
                <h2 class="audio-view__title" id="audioViewTitle">-</h2>
                <p class="audio-view__voice" id="audioViewVoice">-</p>
                <div class="audio-view__progress-container" id="audioProgressContainer">
                    <div class="audio-view__progress">
                        <div class="audio-view__progress-bar" id="audioProgressBar"></div>
                    </div>
                    <p class="audio-view__time" id="audioTime">0:00 / 0:00</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Compact bottom bar -->
    <div class="o2-bottombar" id="bottomControls">
        <button class="o2-bottombar__nav-btn" id="prevWork" aria-label="Forrige sang">⏮</button>
        <div class="o2-bottombar__center">
            <span class="o2-bottombar__title" id="currentTitle">Velg stemme</span>
            <div class="o2-bottombar__player">
                <button class="o2-bottombar__play" id="playPauseBtn" aria-label="Spill/Pause">▶</button>
                <div class="o2-bottombar__progress" id="audioProgressClickable">
                    <div class="o2-bottombar__progress-bar">
                        <div class="o2-bottombar__progress-fill" id="audioProgressFill"></div>
                    </div>
                    <span class="o2-bottombar__time" id="audioTimeDisplay">0:00</span>
                </div>
                <span class="o2-bottombar__page" id="pageNav">
                    <button class="o2-bottombar__page-btn" id="prevPage">‹</button>
                    <span id="pageInfo">1/1</span>
                    <button class="o2-bottombar__page-btn" id="nextPage">›</button>
                </span>
            </div>
        </div>
        <button class="o2-bottombar__nav-btn" id="nextWork" aria-label="Neste sang">⏭</button>
        <span class="audio-status" id="audioStatus" hidden></span>
        <span id="workInfo" hidden></span>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer" preload="auto"></audio>

    <!-- Initial voice selection modal -->
    <div class="welcome-modal" id="welcomeModal" hidden>
        <div class="welcome-modal__content">
            <h2>Velkommen til øvelsen!</h2>
            <p>Velg din stemmegruppe for å starte:</p>
            <div class="welcome-modal__grid">
                <button class="voice-btn" data-voice="sopran 1">Sopran 1</button>
                <button class="voice-btn" data-voice="sopran 2">Sopran 2</button>
                <button class="voice-btn" data-voice="alt 1">Alt 1</button>
                <button class="voice-btn" data-voice="alt 2">Alt 2</button>
                <button class="voice-btn" data-voice="tenor 1">Tenor 1</button>
                <button class="voice-btn" data-voice="tenor 2">Tenor 2</button>
                <button class="voice-btn" data-voice="bass 1">Bass 1</button>
                <button class="voice-btn" data-voice="bass 2">Bass 2</button>
                <button class="voice-btn voice-btn--tutti" data-voice="tutti">Tutti</button>
            </div>
        </div>
    </div>

    <!-- Page Turn Recorder Bar (admin) -->
    <div class="recorder-bar" id="pageTurnRecorder" hidden>
        <span class="recorder-bar__label" id="recorderWorkName">-</span>
        <span class="recorder-bar__turns" id="recorderTurnsInfo">0 skift</span>
        <button class="recorder-bar__btn recorder-bar__btn--start" id="recorderStart">Start</button>
        <button class="recorder-bar__btn recorder-bar__btn--next" id="recorderNext" disabled>Neste</button>
        <span class="recorder-bar__page-group">
            <button class="recorder-bar__btn recorder-bar__btn--jump" id="recorderJump" disabled>Hopp</button>
            <label class="recorder-bar__page-label" id="recorderPageLabel" hidden>s.</label>
            <input type="number" class="recorder-bar__page-input" id="recorderTargetPage" min="1" value="1" hidden>
            <button class="recorder-bar__btn recorder-bar__btn--jump-ok" id="recorderJumpOk" hidden>OK</button>
        </span>
        <button class="recorder-bar__btn recorder-bar__btn--undo" id="recorderUndo" disabled>Angre</button>
        <button class="recorder-bar__btn recorder-bar__btn--stop" id="recorderStop" disabled>Lagre</button>
        <button class="recorder-bar__btn recorder-bar__btn--cancel" id="recorderCancel">✕</button>
        <div class="recorder-bar__list-wrapper" id="recorderListWrapper" hidden>
            <ol class="recorder-bar__list" id="recorderList"></ol>
        </div>
    </div>

    <!-- Loading screen -->
    <div class="loader" id="loader">
        <div class="loader__content">
            <div class="loader__spinner"></div>
            <p class="loader__text">Laster øvelsesdata...</p>
        </div>
    </div>

    <script src="js/env.js"></script>
    <script type="module" src="js/ovelse2.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
